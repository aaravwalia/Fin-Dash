spring.application.name=PolicyServer
# -----------------------------------------------------------------
# 1. JDBC CONNECTION URL
# -----------------------------------------------------------------
# This tells Spring the driver (jdbc:mysql), the server location (localhost:3306), 
# and the database name (policy_db).
spring.datasource.url=jdbc:mysql://localhost:3306/policy_db

# -----------------------------------------------------------------
# 2. MYSQL LOGIN CREDENTIALS
# -----------------------------------------------------------------
# Use the username and password you set for MySQL during installation.
spring.datasource.username=root
spring.datasource.password=aaravwalia

# -----------------------------------------------------------------
# 3. DRIVER AND JPA/HIBERNATE SETTINGS
# -----------------------------------------------------------------
# Specifies the exact Java class to use for the MySQL connection.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tells Spring Data JPA what to do with the database schema:
# 'update' means it will create tables if they don't exist, and update them if the Java models change.
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL queries Spring runs in your console, which is helpful for debugging.
spring.jpa.show-sql=true